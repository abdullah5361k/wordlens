<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WordLens</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 240px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #2d3748;
      background: #fff;
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 16px;
      color: white;
      text-align: center;
    }

    .header h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .header p {
      font-size: 11px;
      opacity: 0.85;
      margin-top: 2px;
    }

    .body {
      padding: 16px;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f0fff4;
      border: 1px solid #9ae6b4;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 14px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #38a169;
      flex-shrink: 0;
    }

    .status span {
      font-size: 13px;
      color: #276749;
      font-weight: 500;
    }

    .instructions {
      font-size: 12.5px;
      color: #4a5568;
      line-height: 1.6;
    }

    .instructions strong {
      color: #2d3748;
    }

    .tip {
      background: #ebf4ff;
      border-radius: 8px;
      padding: 10px 12px;
      margin-top: 12px;
      font-size: 12px;
      color: #2b6cb0;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>WordLens</h1>
    <p>Instant word definitions</p>
  </div>
  <div class="body">
    <div class="status">
      <div class="status-dot"></div>
      <span>Active on all pages</span>
    </div>
    <div class="instructions">
      <strong>How to use:</strong><br />
      Highlight any word or phrase while reading — a definition popup will appear automatically.
    </div>
    <div class="tip">
      Tip: Works best with single words or short phrases (up to 60 characters).
    </div>
  </div>
</body>
</html>
